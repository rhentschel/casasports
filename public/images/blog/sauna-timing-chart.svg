<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="460" fill="#0a0a0a"/>
  <text x="40" y="40" fill="#e63946" font-size="13" font-weight="700" letter-spacing="2.5">TIMING-LOGIK</text>
  <text x="40" y="72" fill="#f5f5f0" font-size="22" font-weight="900" letter-spacing="-0.5">Optimales Sauna-Timing nach Trainingsart</text>

  <!-- Timeline bar: 0 -> 120 Min -->
  <line x1="80" y1="130" x2="760" y2="130" stroke="#333" stroke-width="2"/>
  <text x="80" y="160" fill="#999" font-size="11">0 Min</text>
  <text x="250" y="160" fill="#999" font-size="11">30 Min</text>
  <text x="420" y="160" fill="#999" font-size="11">60 Min</text>
  <text x="590" y="160" fill="#999" font-size="11">90 Min</text>
  <text x="740" y="160" fill="#999" font-size="11">120+</text>
  <text x="40" y="135" fill="#999" font-size="11" text-anchor="end">Training Ende</text>

  <!-- Krafttraining mit Muskelaufbau-Ziel -->
  <text x="40" y="200" fill="#f5f5f0" font-size="13" font-weight="600">Kraft + Muskelaufbau</text>
  <rect x="80" y="210" width="130" height="18" fill="#b53a4d" opacity="0.4"/>
  <text x="145" y="223" fill="#f5f5f0" font-size="10" text-anchor="middle">Kreislauf runter</text>
  <rect x="210" y="210" width="400" height="18" fill="#666" opacity="0.5"/>
  <text x="410" y="223" fill="#f5f5f0" font-size="10" text-anchor="middle">warten (nicht sofort)</text>
  <rect x="610" y="210" width="150" height="18" fill="#e63946"/>
  <text x="685" y="223" fill="#f5f5f0" font-size="10" text-anchor="middle" font-weight="700">Sauna ok</text>

  <!-- Ausdauer -->
  <text x="40" y="260" fill="#f5f5f0" font-size="13" font-weight="600">Ausdauer</text>
  <rect x="80" y="270" width="130" height="18" fill="#b53a4d" opacity="0.4"/>
  <text x="145" y="283" fill="#f5f5f0" font-size="10" text-anchor="middle">Kreislauf runter</text>
  <rect x="210" y="270" width="550" height="18" fill="#e63946"/>
  <text x="485" y="283" fill="#f5f5f0" font-size="10" text-anchor="middle" font-weight="700">Sauna förderlich</text>

  <!-- Hochintensiv/Wettkampf -->
  <text x="40" y="320" fill="#f5f5f0" font-size="13" font-weight="600">HIIT / Wettkampf</text>
  <rect x="80" y="330" width="230" height="18" fill="#b53a4d" opacity="0.4"/>
  <text x="195" y="343" fill="#f5f5f0" font-size="10" text-anchor="middle">Kreislauf noch aktiv</text>
  <rect x="310" y="330" width="450" height="18" fill="#6a2028"/>
  <text x="535" y="343" fill="#f5f5f0" font-size="10" text-anchor="middle">lieber am Folgetag</text>

  <!-- Wellness / lockeres Training -->
  <text x="40" y="380" fill="#f5f5f0" font-size="13" font-weight="600">Leichtes Cardio</text>
  <rect x="80" y="390" width="60" height="18" fill="#b53a4d" opacity="0.3"/>
  <rect x="140" y="390" width="620" height="18" fill="#e63946"/>
  <text x="450" y="403" fill="#f5f5f0" font-size="10" text-anchor="middle" font-weight="700">Sauna jederzeit ok</text>

  <!-- Legende -->
  <rect x="40" y="430" width="14" height="10" fill="#e63946"/>
  <text x="60" y="440" fill="#999" font-size="10">Sauna empfohlen</text>
  <rect x="200" y="430" width="14" height="10" fill="#666" opacity="0.5"/>
  <text x="220" y="440" fill="#999" font-size="10">Warten</text>
  <rect x="320" y="430" width="14" height="10" fill="#6a2028"/>
  <text x="340" y="440" fill="#999" font-size="10">Eher meiden</text>
  <rect x="450" y="430" width="14" height="10" fill="#b53a4d" opacity="0.4"/>
  <text x="470" y="440" fill="#999" font-size="10">Cool-Down Phase</text>
</svg>
