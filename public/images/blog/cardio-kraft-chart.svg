<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Inter, system-ui, sans-serif">
  <rect width="800" height="420" fill="#0a0a0a"/>

  <!-- Titel -->
  <text x="40" y="40" fill="#e63946" font-size="13" font-weight="700" letter-spacing="2.5">GEWICHTUNG NACH ZIEL</text>
  <text x="40" y="72" fill="#f5f5f0" font-size="22" font-weight="900" letter-spacing="-0.5">Cardio vs. Krafttraining</text>

  <!-- Legende -->
  <rect x="580" y="25" width="14" height="14" fill="#e63946"/>
  <text x="600" y="37" fill="#f5f5f0" font-size="11">Krafttraining</text>
  <rect x="680" y="25" width="14" height="14" fill="#666"/>
  <text x="700" y="37" fill="#f5f5f0" font-size="11">Cardio</text>

  <!-- Bars: 5 rows. Jede Bar ist 500px breit, bei 200 startend -->
  <!-- Row 1: Abnehmen 50/50 -->
  <text x="40" y="140" fill="#999" font-size="12">Abnehmen &amp; Figur</text>
  <rect x="220" y="125" width="250" height="22" fill="#e63946"/>
  <rect x="470" y="125" width="250" height="22" fill="#666"/>
  <text x="340" y="141" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">50%</text>
  <text x="590" y="141" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">50%</text>

  <!-- Row 2: Muskelaufbau 70/30 -->
  <text x="40" y="185" fill="#999" font-size="12">Muskelaufbau</text>
  <rect x="220" y="170" width="350" height="22" fill="#e63946"/>
  <rect x="570" y="170" width="150" height="22" fill="#666"/>
  <text x="395" y="186" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">70%</text>
  <text x="645" y="186" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">30%</text>

  <!-- Row 3: Ausdauer 30/70 -->
  <text x="40" y="230" fill="#999" font-size="12">Ausdauer verbessern</text>
  <rect x="220" y="215" width="150" height="22" fill="#e63946"/>
  <rect x="370" y="215" width="350" height="22" fill="#666"/>
  <text x="295" y="231" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">30%</text>
  <text x="545" y="231" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">70%</text>

  <!-- Row 4: Gesundheit 50/50 -->
  <text x="40" y="275" fill="#999" font-size="12">Gesundheit &amp; Langlebigkeit</text>
  <rect x="220" y="260" width="250" height="22" fill="#e63946"/>
  <rect x="470" y="260" width="250" height="22" fill="#666"/>
  <text x="340" y="276" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">50%</text>
  <text x="590" y="276" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">50%</text>

  <!-- Row 5: Hybrid 50/50 kombiniert -->
  <text x="40" y="320" fill="#999" font-size="12">Hybrid/Functional</text>
  <rect x="220" y="305" width="500" height="22" fill="url(#grad1)"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="50%" stop-color="#a53a4d"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
  </defs>
  <text x="470" y="321" fill="#f5f5f0" font-size="11" font-weight="700" text-anchor="middle">Kombiniert 50/50</text>

  <!-- Footer: Quelle -->
  <text x="40" y="390" fill="#666" font-size="10">Basis: JISSN Meta-Analyse 2025, WHO-Bewegungsempfehlungen</text>
</svg>
