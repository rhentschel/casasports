<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#c1303b"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund -->
  <rect width="800" height="500" fill="#0a0a0a"/>

  <!-- Titel -->
  <text x="40" y="40" fill="#e63946" font-size="13" font-weight="700" letter-spacing="2.5">KERNAUSSAGE</text>
  <text x="40" y="75" fill="#f5f5f0" font-size="24" font-weight="900" letter-spacing="-0.5">Proteinbedarf pro Kilogramm Körpergewicht</text>
  <text x="40" y="100" fill="#999" font-size="13">Empfehlungen der International Society of Sports Nutrition</text>

  <!-- Y-Axis Labels -->
  <text x="35" y="180" fill="#808080" font-size="11" text-anchor="end">3.0</text>
  <text x="35" y="240" fill="#808080" font-size="11" text-anchor="end">2.0</text>
  <text x="35" y="300" fill="#808080" font-size="11" text-anchor="end">1.6</text>
  <text x="35" y="360" fill="#808080" font-size="11" text-anchor="end">1.2</text>
  <text x="35" y="420" fill="#808080" font-size="11" text-anchor="end">0.8</text>

  <!-- Gridlines -->
  <line x1="50" y1="180" x2="770" y2="180" stroke="#ffffff11" stroke-dasharray="2,4"/>
  <line x1="50" y1="240" x2="770" y2="240" stroke="#ffffff11" stroke-dasharray="2,4"/>
  <line x1="50" y1="300" x2="770" y2="300" stroke="#ffffff11" stroke-dasharray="2,4"/>
  <line x1="50" y1="360" x2="770" y2="360" stroke="#ffffff11" stroke-dasharray="2,4"/>
  <line x1="50" y1="420" x2="770" y2="420" stroke="#ffffff11" stroke-dasharray="2,4"/>

  <!-- Y-Axis unit -->
  <text x="15" y="300" fill="#808080" font-size="10" transform="rotate(-90 15 300)">g Protein / kg Körpergewicht / Tag</text>

  <!-- Bars (5 Profile) -->
  <!-- Scale: y=420 (0.8g) bis y=160 (3.2g). Jeder 0.4g = 43.33px -->
  <!-- Büro 0.8g: y=420, height=0 (baseline) -->

  <!-- Büromensch (0.8 g/kg) -->
  <rect x="100" y="420" width="80" height="40" fill="url(#bar1)" opacity="0.35"/>
  <text x="140" y="415" fill="#f5f5f0" font-size="12" font-weight="700" text-anchor="middle">0,8</text>
  <text x="140" y="485" fill="#999" font-size="11" text-anchor="middle">Inaktiv</text>

  <!-- Aktiv (1.4-1.8) -->
  <rect x="230" y="310" width="80" height="150" fill="url(#bar1)" opacity="0.6"/>
  <text x="270" y="305" fill="#f5f5f0" font-size="12" font-weight="700" text-anchor="middle">1,4–1,8</text>
  <text x="270" y="485" fill="#999" font-size="11" text-anchor="middle">Aktiv</text>

  <!-- Ausdauer (1.4-1.8) -->
  <rect x="360" y="310" width="80" height="150" fill="url(#bar1)" opacity="0.7"/>
  <text x="400" y="305" fill="#f5f5f0" font-size="12" font-weight="700" text-anchor="middle">1,4–1,8</text>
  <text x="400" y="485" fill="#999" font-size="11" text-anchor="middle">Ausdauer</text>

  <!-- Kraftsport (1.6-2.2) -->
  <rect x="490" y="250" width="80" height="210" fill="url(#bar1)" opacity="0.85"/>
  <text x="530" y="245" fill="#f5f5f0" font-size="12" font-weight="700" text-anchor="middle">1,6–2,2</text>
  <text x="530" y="485" fill="#999" font-size="11" text-anchor="middle">Kraftsport</text>

  <!-- Diät (2.2-3.1) -->
  <rect x="620" y="175" width="80" height="285" fill="url(#bar1)"/>
  <text x="660" y="170" fill="#f5f5f0" font-size="12" font-weight="700" text-anchor="middle">2,2–3,1</text>
  <text x="660" y="485" fill="#999" font-size="11" text-anchor="middle">Diätphase</text>

  <!-- X-Axis Baseline -->
  <line x1="50" y1="460" x2="770" y2="460" stroke="#ffffff22" stroke-width="1"/>
</svg>
